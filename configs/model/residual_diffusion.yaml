__target__: ResidualDiffusionModule

# Geometry and DGCNN capacity match the VM baseline.
frame_knn: 16
num_train_points: 128
feat_embedding_dim: 256
decoder_hidden_dim: 64
condition_embedding_dim: 64

# Conditional residual diffusion.
objective: diffusion
prediction_type: v
num_train_steps: 1000
cosine_s: 0.008
num_inference_steps: 4
lambda_l1: 0.1
lambda_cd: 0.0
condition_on_time: true
condition_on_observation_std: true
clip_normalized_residual: 8.0

# Observation-noise conditioning.
noise_std_min: 0.005
noise_std_max: 0.020
inference_noise_mode: fixed
inference_noise_std: 0.0125

# Full-cloud patch inference.
patch_size: 1000
seed_k: 6
seed_k_alpha: 1
predict_rounds: 1
sampling_seed: 123
