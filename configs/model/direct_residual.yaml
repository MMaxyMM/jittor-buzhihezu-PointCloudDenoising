__target__: ResidualDiffusionModule

frame_knn: 16
num_train_points: 128
feat_embedding_dim: 256
decoder_hidden_dim: 64
condition_embedding_dim: 64

# Backbone-matched endpoint residual regression ablation.
objective: direct
prediction_type: v
num_train_steps: 1000
num_inference_steps: 1
lambda_l1: 0.0
condition_on_time: false
condition_on_observation_std: true
clip_normalized_residual: 8.0

noise_std_min: 0.005
noise_std_max: 0.020
inference_noise_mode: fixed
inference_noise_std: 0.0125

patch_size: 1000
seed_k: 6
seed_k_alpha: 1
predict_rounds: 1
sampling_seed: 123
